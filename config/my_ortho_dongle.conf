# Включаем роль Central (управление беспроводным соединением)
CONFIG_ZMK_SPLIT_BLE_ROLE_CENTRAL=y

# Указываем, сколько устройств подключается к донглу (для моноблока — 1)
CONFIG_ZMK_SPLIT_NUM_PERIPHERALS=1

# Отключаем глубокий сон на донгле, чтобы он не отваливался от USB
CONFIG_ZMK_SLEEP=n

# Увеличиваем мощность передатчика для стабильности связи
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Опционально: ускоряет повторное подключение при включении клавиатуры
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12